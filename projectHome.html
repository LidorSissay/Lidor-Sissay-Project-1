<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="project.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Home</title>
</head>

<body class="bg-gray-50 font-sans min-h-screen">
    <div class="container mx-auto max-w-5xl px-4 py-10">
        <div id="header" class="mb-8 text-center border-b border-gray-200 pb-6">
            <h1 class="text-4xl font-extrabold text-indigo-600 tracking-tight">Expenses List</h1>
        </div>

        <div class="navbar mb-8 bg-white shadow-sm rounded-xl p-3 border border-gray-100">
            <nav id="navigate" class="flex justify-center gap-6 font-bold text-indigo-500"></nav>
        </div>

        <div class="main">
            <form id="form" onsubmit="addEx(event)"
                class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-12 bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
                <input type="hidden" id="update" value="">

                <select id="category" required
                    class="border border-gray-200 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-gray-50 text-gray-700 transition-all cursor-pointer">
                    <option value="" disabled selected>Choose category:</option>
                    <option value="food">Food</option>
                    <option value="fuel">Fuel</option>
                    <option value="recreation">Recreation</option>
                    <option value="authorities">Authorities</option>
                    <option value="other">Other</option>
                </select>

                <textarea id="description" placeholder="Description"
                    class="border border-gray-200 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-gray-50 text-gray-700 transition-all md:row-span-2 resize-none"></textarea>

                <input id="amount" placeholder="Amount" type="number" min="1" max="100000" required
                    class="border border-gray-200 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-gray-50 text-gray-700 transition-all">

                <input id="date" type="date" required
                    class="border border-gray-200 p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-gray-50 text-gray-700 transition-all">

                <button
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3 px-6 rounded-lg shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200 md:col-span-2">
                    Add Expense
                </button>
            </form>

            <div class="overflow-x-auto shadow-2xl rounded-2xl border border-gray-200">
                <table class="min-w-full table-auto border-collapse bg-white">
                    <thead class="bg-indigo-600 text-white">
                        <tr>
                            <th class="p-4 text-left font-semibold uppercase tracking-wider text-sm">Category</th>
                            <th class="p-4 text-left font-semibold uppercase tracking-wider text-sm">Description</th>
                            <th class="p-4 text-left font-semibold uppercase tracking-wider text-sm">Amount</th>
                            <th class="p-4 text-left font-semibold uppercase tracking-wider text-sm">Date</th>
                        </tr>
                    </thead>
                    <tbody id="newRow" class="divide-y divide-gray-100 bg-white"></tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
