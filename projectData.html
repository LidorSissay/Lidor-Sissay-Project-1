<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Graphs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="project.js" defer></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen">
    <div class="container mx-auto max-w-5xl px-4 py-10">
        <div id="header" class="mb-8 text-center border-b border-gray-200 pb-6">
            <h1 class="text-4xl font-extrabold text-indigo-600 tracking-tight">Analytics & Reports</h1>
        </div>

        <div class="navbar mb-8 bg-white shadow-sm rounded-xl p-3 border border-gray-100">
            <nav id="navigate" class="flex justify-center gap-6 font-bold text-indigo-500"></nav>
        </div>

        <div class="flex flex-col md:flex-row justify-center gap-4 mb-10">
            <button onclick="exportToPDF()" class="bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 px-8 rounded-lg shadow-md transition-all">
                Export to PDF
            </button>
            <button onclick="exportToCSV()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-8 rounded-lg shadow-md transition-all">
                Export to CSV
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
                <h2 class="text-xl font-bold mb-6 text-gray-700 border-b pb-4 text-center">Expenses by Category</h2>
                <div class="relative h-[350px]">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
            <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
                <h2 class="text-xl font-bold mb-6 text-gray-700 border-b pb-4 text-center">Monthly Spending</h2>
                <div class="relative h-[350px]">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
